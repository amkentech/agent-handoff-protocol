name: injection-scan

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  injection-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/injection-scan.mjs
